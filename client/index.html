  <meta charset="utf-8">
  <title>StockHub</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">

        <div class="logo">
          <svg class="logo-svg" viewBox="0 0 861 181" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0)">

            <path d="M603.41 136.5V52.89h17.39v36.14h32.55V52.89h17.39V136.5h-17.39v-32.32h-32.55v32.32h-17.39zM715.45 137.85c-6.58 0-12.46-1.38-17.62-4.15-5.16-2.77-9.24-6.55-12.23-11.33-2.92-4.86-4.38-10.36-4.38-16.5V52.89h17.4v51.85c0 3.29.71 6.28 2.13 8.98 1.5 2.62 3.52 4.67 6.06 6.17 2.54 1.5 5.42 2.25 8.64 2.25 3.29 0 6.17-.75 8.64-2.25 2.54-1.5 4.52-3.55 5.95-6.17 1.5-2.7 2.24-5.69 2.24-8.98V52.89h17.4v52.97c0 6.14-1.5 11.63-4.49 16.5-2.92 4.78-6.96 8.56-12.12 11.33-5.16 2.77-11.04 4.15-17.62 4.15zM760.08 136.5V52.89h35.35c5.76 0 10.7.97 14.81 2.92 4.12 1.95 7.26 4.75 9.43 8.42 2.17 3.59 3.25 7.97 3.25 13.13 0 3.67-1.01 7.18-3.03 10.55-2.02 3.29-5.35 6.06-9.99 8.3v-8.53c4.41 1.72 7.82 3.78 10.21 6.17 2.39 2.39 4.04 5.01 4.94 7.86.9 2.77 1.35 5.69 1.35 8.75 0 8.23-2.73 14.63-8.19 19.19-5.46 4.56-13.05 6.85-22.78 6.85h-35.35zm17.39-15.15h19.98c3.52 0 6.32-1.01 8.42-3.03 2.09-2.02 3.14-4.64 3.14-7.86 0-3.29-1.05-5.95-3.14-7.97-2.1-2.02-4.9-3.03-8.42-3.03h-19.98v21.89zm0-37.03h19.19c2.69 0 4.82-.75 6.4-2.24 1.64-1.57 2.47-3.63 2.47-6.17 0-2.54-.83-4.56-2.47-6.06-1.58-1.57-3.71-2.36-6.4-2.36h-19.19v16.83z" fill="url(#logoGrad2)"/>
            <defs>
              <radialGradient id="logoGrad1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(90.89 35.01) scale(140.39 165.41)">
                <stop offset=".08" stop-color="#E5DBC3"/><stop offset=".25" stop-color="#D4C39D"/><stop offset=".42" stop-color="#C8AE82"/><stop offset=".58" stop-color="#B58F5A"/><stop offset=".75" stop-color="#8C6542"/><stop offset=".93" stop-color="#5C4332"/>
              </radialGradient>
              <radialGradient id="logoGrad2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(713.34 48.51) scale(208.81 124)">
                <stop offset=".08" stop-color="#E5DBC3"/><stop offset=".25" stop-color="#D4C39D"/><stop offset=".42" stop-color="#C8AE82"/><stop offset=".58" stop-color="#B58F5A"/><stop offset=".75" stop-color="#8C6542"/><stop offset=".93" stop-color="#5C4332"/>
              </radialGradient>
              <clipPath id="clip0"><rect width="181" height="181" fill="white"/></clipPath>
            </defs>
          </svg>
        </div>
        <div class="header-actions">
          <button class="btn-icon" onclick="refreshFiles()" title="Atualizar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
          <button class="btn-icon" onclick="toggleMetrics()" title="Metricas" id="metricsBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </button>
          <button class="btn-icon" onclick="toggleSettings()" title="Configuracoes" id="settingsBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- Tabs -->
      <div class="tabs" id="formatTabs">
        <button class="tab active" data-format="all" onclick="setFormat('all', this)">Todos</button>
        <button class="tab" data-format="video" onclick="setFormat('video', this)">Video</button>
        <button class="tab" data-format="audio" onclick="setFormat('audio', this)">Audio</button>
        <button class="tab" data-format="image" onclick="setFormat('image', this)">Imagem</button>
        <button class="tab" data-format="mogrt" onclick="setFormat('mogrt', this)">MOGRT</button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Buscar arquivo..." id="searchInput" oninput="filterFiles()">
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content" id="mainContent">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          Categorias
          <button class="btn-icon" onclick="showAddCategoryModal()" title="Nova categoria" style="width:20px;height:20px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="categoryList"></div>
        <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
      </div>

      <!-- Grid -->
      <div class="grid-container" id="gridContainer">
        <div class="grid" id="fileGrid"></div>
      </div>

      <!-- Metrics Panel -->
      <div class="settings-panel" id="metricsPanel" style="display:none; width:100%;">
        <div class="settings-section-title" style="margin-bottom:12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          Metricas de Uso
        </div>
        <div id="metricsContent"></div>
        <div class="settings-section" style="margin-top:12px;">
          <button class="btn btn-primary" onclick="toggleMetrics()" style="width:100%;justify-content:center;padding:8px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Voltar
          </button>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="settings-panel" id="settingsPanel" style="display:none; width:100%; flex-direction:column; height:100%;">

        <div style="flex:1; overflow-y:auto; min-height:0;">
          <div class="settings-columns">
            <!-- Column: Pasta -->
            <div class="settings-section settings-col">
              <div class="settings-section-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                </svg>
                Pasta de Assets
              </div>
              <div class="settings-card" style="flex:1;">
                <div id="stockFolderPath" class="folder-path-display"></div>
                <div class="settings-row" style="gap:6px;">
                  <button class="btn" onclick="changeStockFolder()" style="flex:1;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Alterar pasta
                  </button>
                  <button class="btn" onclick="openStockFolder()" style="flex:1;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                      <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Abrir no Explorer
                  </button>
                </div>
                <button class="btn" onclick="resetStockFolder()" style="width:100%;margin-top:4px;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                  </svg>
                  Restaurar pasta padrao
                </button>
                <p class="settings-hint">Subpastas viram categorias automaticamente.</p>
              </div>
            </div>

            <!-- Column: Categorias -->
            <div class="settings-section settings-col">
              <div class="settings-section-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                  <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                Categorias
              </div>
              <div class="settings-card" style="flex:1;display:flex;flex-direction:column;">
                <div class="cat-edit-actions" style="display:flex;gap:4px;margin-bottom:6px;">
                  <button class="btn" onclick="toggleSelectAllCategories()" id="selectAllCatsBtn" style="flex:1;font-size:10px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Selecionar todas
                  </button>
                  <button class="btn danger" onclick="removeSelectedCategories()" style="flex:1;font-size:10px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    Excluir selecionadas
                  </button>
                </div>
                <div class="cat-edit-list" id="catEditList" style="flex:1;overflow-y:auto;"></div>
                <button class="btn" onclick="showAddCategoryModal()" style="margin-top:8px;width:100%;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                  Adicionar categoria
                </button>
              </div>
            </div>
          </div>

          <!-- Column: Staging -->
          <div class="settings-section settings-col">
            <div class="settings-section-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
              </svg>
              Staging Local
            </div>
            <div class="settings-card" style="flex:1;">
              <div id="stagingFolderPath" class="folder-path-display"></div>
              <button class="btn" onclick="changeStagingFolder()" style="width:100%;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Alterar pasta de staging
              </button>
              <button class="btn" onclick="clearStagingFolder()" style="width:100%;margin-top:4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
                Limpar staging (<span id="stagingSize">0 KB</span>)
              </button>
              <p class="settings-hint">Assets da nuvem sao copiados aqui antes de importar no Premiere, evitando crash na exportacao.</p>
            </div>
          </div>
        </div>
        </div>

        <!-- Section: Changelog + Sobre + Voltar (fixo na parte inferior) -->
        <div class="settings-section" style="flex-shrink:0; padding-top:12px;">
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <button class="btn" onclick="showChangelogModal()" style="flex:1;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              Ver changelog
            </button>
            <button class="btn" onclick="showAboutModal()" style="flex:1;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
              </svg>
              Sobre
            </button>
          </div>
          <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;justify-content:center;padding:8px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Salvar e voltar
          </button>
        </div>
      </div>
    </div>

    <!-- Grid Size Slider -->
    <div class="grid-slider-bar" id="gridSliderBar">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <input type="range" min="80" max="250" value="110" id="gridSize" oninput="updateGridSize()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div>
        <span class="status-dot"></span>
        <span id="statusText">Pronto</span>
      </div>
      <span id="fileCount">0 arquivos</span>
      <span id="versionLabel" class="version-label" onclick="showAboutModal()"></span>
    </div>
  </div>

  <div id="modalContainer"></div>

  <script src="../lib/CSInterface.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
